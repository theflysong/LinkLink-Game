plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
    implementation libs.netty.all
    implementation libs.lwjgl
    implementation libs.lwjgl.glfw
    implementation libs.lwjgl.opengl
    implementation libs.lwjgl.stb
    implementation libs.lwjgl.openal
    implementation libs.joml
    implementation libs.gson
    implementation libs.jspecify
    implementation libs.iogame
    implementation libs.log4j.api
    implementation libs.log4j.core
    runtimeOnly libs.jansi
    runtimeOnly(variantOf(libs.lwjgl) { classifier('natives-windows') })
    runtimeOnly(variantOf(libs.lwjgl.glfw) { classifier('natives-windows') })
    runtimeOnly(variantOf(libs.lwjgl.opengl) { classifier('natives-windows') })
    runtimeOnly(variantOf(libs.lwjgl.stb) { classifier('natives-windows') })
    runtimeOnly(variantOf(libs.lwjgl.openal) { classifier('natives-windows') })
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'io.github.theflysong.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

tasks.named('jar') {
    // Build a runnable fat jar that bundles the runtime classpath.
    manifest {
        attributes 'Main-Class': 'io.github.theflysong.App'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.findAll { it.name.endsWith('.jar') }.collect { zipTree(it) }
    }
}
